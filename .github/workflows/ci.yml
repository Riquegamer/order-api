name: CI/CD Pipeline - NF-e API

# Gatilhos: A esteira roda sempre que houver um push na branch main
on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: henriquecosta500/order-api
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    name: Build & Test (.NET 10)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código fonte
        uses: actions/checkout@v4

      - name: Setup do .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restaurar dependências
        run: dotnet restore

      - name: Build da aplicação (Arquitetura Hexagonal)
        run: dotnet build --no-restore --configuration Release

      - name: Rodar Testes Unitários
        run: dotnet test --no-build --configuration Release --verbosity normal

  docker-build-push:
    name: Build & Push Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.generate_tag.outputs.TAG }}
    steps:
      - name: Checkout do código fonte
        uses: actions/checkout@v4

      - name: Gerar Tag Única da Imagem
        id: generate_tag
        run: echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push da Imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.generate_tag.outputs.TAG }}
            ${{ env.DOCKER_IMAGE }}:latest

  update-gitops-repo:
    name: Atualizar Repositório GitOps
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Repositório de Infraestrutura
        uses: actions/checkout@v4
        with:
          repository: Riquegamer/order-infra-gitops
          token: ${{ secrets.INFRA_REPO_PAT }}
          ref: main

      - name: Atualizar a Tag da Imagem no Manifesto YAML
        env:
          NEW_TAG: ${{ needs.docker-build-push.outputs.image_tag }}
        run: |
          sed -i "s|image: ${{ env.DOCKER_IMAGE }}:.*|image: ${{ env.DOCKER_IMAGE }}:${NEW_TAG}|g" k8s/validation/api-deployment.yaml

      - name: Commit e Push das alterações de Infra
        env:
          NEW_TAG: ${{ needs.docker-build-push.outputs.image_tag }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add k8s/validation/api-deployment.yaml
          git commit -m "chore(deploy): atualiza API para a tag ${NEW_TAG}"
          git push origin main