name: CI/CD Pipeline - NF-e API

# Gatilhos: Roda em pushes para main E develop
on:
  push:
    branches:
      - main
      - develop

env:
  DOCKER_IMAGE: henriquecosta500/order-api
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    name: Build & Test (.NET 10)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código fonte
        uses: actions/checkout@v4

      - name: Setup do .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restaurar dependências
        run: dotnet restore

      - name: Build da aplicação
        run: dotnet build --no-restore --configuration Release

      - name: Rodar Testes Unitários
        run: dotnet test --no-build --configuration Release --verbosity normal

  docker-build-push:
    name: Build & Push Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.generate_tag.outputs.TAG }}
    steps:
      - name: Checkout do código fonte
        uses: actions/checkout@v4

      - name: Gerar Tag Única da Imagem
        id: generate_tag
        # Adiciona o prefixo da branch (dev- ou prod-) junto com o hash do commit
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "TAG=prod-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "TAG=dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push da Imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:${{ steps.generate_tag.outputs.TAG }}

  update-gitops-repo:
    name: Atualizar Repositório GitOps
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Determinar Ambiente de Destino
        id: target_env
        # Define a pasta alvo no repositório GitOps dependendo da branch atual
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV_FOLDER=k8s/production" >> $GITHUB_ENV
            echo "ENV_NAME=Produção" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "ENV_FOLDER=k8s/validation" >> $GITHUB_ENV
            echo "ENV_NAME=Validação" >> $GITHUB_ENV
          fi

      - name: Checkout do Repositório de Infraestrutura (GitOps)
        uses: actions/checkout@v4
        with:
          repository: Riquegamer/order-infra-gitops.git
          token: ${{ secrets.INFRA_REPO_PAT }}
          ref: main

      - name: Atualizar a Tag da Imagem no Manifesto YAML
        env:
          NEW_TAG: ${{ needs.docker-build-push.outputs.image_tag }}
        # Vai alterar APENAS o arquivo da pasta correspondente à branch (produção ou validação)
        run: |
          sed -i "s|image: ${{ env.DOCKER_IMAGE }}:.*|image: ${{ env.DOCKER_IMAGE }}:${NEW_TAG}|g" ${{ env.ENV_FOLDER }}/api-deployment.yaml

      - name: Commit e Push das alterações de Infra
        env:
          NEW_TAG: ${{ needs.docker-build-push.outputs.image_tag }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add ${{ env.ENV_FOLDER }}/api-deployment.yaml
          git commit -m "chore(deploy): atualiza API em ${{ env.ENV_NAME }} para tag ${NEW_TAG}"
          git push origin main